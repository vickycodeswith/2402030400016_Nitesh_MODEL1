<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Container Example</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Fixed Width Container -->
    <div class="container bg-light p-3 mt-3 border">
        <h2>Fixed Width Container</h2>

        <p>
            This container has fixed responsive width according to screen size.
        </p>
    </div>

    <!-- Full Width Container -->
    <div class="container-fluid bg-warning p-3 mt-3 border">
        <h2>Full Width Container</h2>

        <p>
            This container takes full width of the screen.
        </p>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
