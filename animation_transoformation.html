<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Box Transformation Showroom</title>
  <style>
    /* Reset and Core Layout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    header h1 {
      font-size: 2.5rem;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    header p {
      color: #94a3b8;
    }

    /* Container for the demo rows */
    .container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 80px;
    }

    .demo-section {
      background-color: #1e293b;
      border-radius: 16px;
      padding: 30px;
      border: 1px solid #334155;
    }

    .demo-section h2 {
      font-size: 1.5rem;
      margin-bottom: 30px;
      color: #cbd5e1;
      border-left: 4px solid #6366f1;
      padding-left: 15px;
    }

    /* Track Layout for Boxes */
    .box-grid {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
      min-height: 200px;
    }

    /* Base Styling for All Boxes */
    .box {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 0.9rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      user-select: none;
    }

    /* ========================================================
       SECTION 1: HOVER TRANSFORMATION EFFECTS
       ======================================================== */
    .box-hover-1 {
      background: linear-gradient(135deg, #f43f5e, #be123c);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .box-hover-1:hover {
      /* Scales up and skews sideways */
      transform: scale(1.2) skewX(-10deg);
    }

    .box-hover-2 {
      background: linear-gradient(135deg, #eab308, #ca8a04);
      transition: transform 0.5s ease;
    }
    .box-hover-2:hover {
      /* Rotates 180 degrees while translating upward */
      transform: translateY(-20px) rotate(180deg);
    }

    .box-hover-3 {
      background: linear-gradient(135deg, #10b981, #047857);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .box-hover-3:hover {
      /* Scales down, flips completely around, and shifts sideways */
      transform: scale(0.8) rotateY(360deg) translateX(15px);
    }


    /* ========================================================
       SECTION 2: CONTINUOUS MULTIPLE BOX ROTATION
       ======================================================== */
    .spinning-container {
      perspective: 1000px; /* Gives 3D depth to the rotation */
    }

    .box-spin {
      background: linear-gradient(135deg, #6366f1, #4338ca);
      animation: continuousRotate 4s linear infinite;
    }

    /* Staggering the animation timing for multiple boxes */
    .spin-delay-1 { animation-delay: 0s; }
    .spin-delay-2 { animation-delay: 1.33s; }
    .spin-delay-3 { animation-delay: 2.66s; }

    @keyframes continuousRotate {
      0% {
        transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      }
      50% {
        transform: rotateX(180deg) rotateY(180deg) rotateZ(0deg);
        background: linear-gradient(135deg, #a855f7, #7e22ce); /* Color shift midway */
      }
      100% {
        transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
      }
    }


    /* ========================================================
       SECTION 3: SEQUENTIAL WAVE PRE-SET ANIMATION  
       ======================================================== */
    .box-wave {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      animation: fluidWave 2.5s ease-in-out infinite;
    }

    /* Offsetting the execution loop to generate a wave flow sequence */
    .wave-1 { animation-delay: 0.1s; }
    .wave-2 { animation-delay: 0.3s; }
    .wave-3 { animation-delay: 0.5s; }
    .wave-4 { animation-delay: 0.7s; }
    .wave-5 { animation-delay: 0.9s; }

    @keyframes fluidWave {
      0%, 100% {
        transform: translateY(0) scale(1) rotate(0deg);
        border-radius: 12px;
      }
      30% {
        transform: translateY(-40px) scale(1.15) rotate(45deg);
        border-radius: 50px; /* Temporarily turns box into a circle shape */
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      }
      60% {
        transform: translateY(15px) scale(0.9) rotate(-15deg);
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>CSS CSS Transformation Engine</h1>
    <p>Move your mouse over elements or observe the continuous rendering system.</p>
  </header>

  <div class="container">

    <!-- DEMO 1: HOVER TRANSFORMS -->
    <section class="demo-section">
      <h2>1. Interactive Mouse Hover Transformations</h2>
      <div class="box-grid">
        <div class="box box-hover-1">Skew Scale</div>
        <div class="box box-hover-2">Lift Spin</div>
        <div class="box box-hover-3">3D Flip</div>
      </div>
    </section>

    <!-- DEMO 2: 3D MULTI-AXIS ROTATION -->
    <section class="demo-section spinning-container">
      <h2>2. Asynchronous Multi-Axis 3D Rotation</h2>
      <div class="box-grid">
        <div class="box box-spin spin-delay-1">Box A</div>
        <div class="box box-spin spin-delay-2">Box B</div>
        <div class="box box-spin spin-delay-3">Box C</div>
      </div>
    </section>

    <!-- DEMO 3: SEQUENTIAL WAVE ANIMATION -->
    <section class="demo-section">
      <h2>3. Multi-Box Transforming Fluid Wave</h2>
      <div class="box-grid">
        <div class="box box-wave wave-1">01</div>
        <div class="box box-wave wave-2">02</div>
        <div class="box box-wave wave-3">03</div>
        <div class="box box-wave wave-4">04</div>
        <div class="box box-wave wave-5">05</div>
      </div>
    </section>

  </div>

</body>
</html>
